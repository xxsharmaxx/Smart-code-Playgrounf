<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Code Playground</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">⚡ Smart Playground</span>

    <div class="ms-auto d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" onclick="toggleTheme()">🌙 Theme</button>
        <button class="btn btn-outline-warning btn-sm" onclick="saveCode()">💾 Save</button>
        <button class="btn btn-outline-info btn-sm" onclick="loadCode()">📂 Load</button>
        <button class="btn btn-outline-success btn-sm" onclick="downloadCode()">⬇ Download</button>
    </div>
</nav>

<div class="container-fluid mt-3">
<div class="row g-3">

<!-- LEFT SIDE -->
<div class="col-lg-7 col-md-12">

<ul class="nav nav-tabs">
  <li class="nav-item">
    <button class="nav-link active" onclick="switchTab('html', this)">HTML</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" onclick="switchTab('css', this)">CSS</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" onclick="switchTab('js', this)">JS</button>
  </li>
</ul>

<textarea id="html" class="editor"></textarea>
<textarea id="css" class="editor d-none"></textarea>
<textarea id="js" class="editor d-none"></textarea>

<div class="d-flex gap-3 mt-3">
    <button class="btn btn-success w-50" onclick="runCode()">▶ Run</button>
    <button class="btn btn-danger w-50" onclick="clearCode()">✖ Clear</button>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="col-lg-5 col-md-12">
<div class="output-box">
<div class="output-header">Live Preview</div>
<iframe id="output"></iframe>
</div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
